<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>樹德 AI 投資助理</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --dark:#1B2340; --dark2:#232C52; --red:#C8102E; --ink:#2B2F3A;
    --muted:#8A93A6; --line:#ECEEF3; --bg:#F4F6FA; --bull:#D81E27; --bear:#12A150; --flat:#7A8699;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--bg); color:var(--ink); display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  /* Header */
  header{
    background:linear-gradient(135deg,var(--dark),var(--dark2)); color:#fff;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px; display:flex; align-items:center; gap:12px;
    box-shadow:0 2px 10px rgba(20,25,50,.18); z-index:5;
  }
  .logo{width:38px;height:38px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;overflow:hidden;}
  .logo svg{width:30px;height:30px;}
  header .t{flex:1;min-width:0;}
  header .t h1{font-size:16px;margin:0;font-weight:800;letter-spacing:.3px;}
  header .t p{font-size:11.5px;margin:2px 0 0;color:#C9D0E6;}
  header button.newchat{
    background:rgba(255,255,255,.14);color:#fff;border:0;border-radius:20px;padding:7px 12px;font-size:12px;font-weight:700;
  }
  header button.newchat:active{background:rgba(255,255,255,.28);}
  /* Messages */
  #msgs{flex:1;overflow-y:auto;padding:16px 12px 8px;-webkit-overflow-scrolling:touch;}
  .row{display:flex;margin:10px 0;}
  .row.me{justify-content:flex-end;}
  .bubble{max-width:82%;padding:11px 14px;border-radius:16px;font-size:15px;line-height:1.55;word-break:break-word;white-space:pre-wrap;}
  .row.me .bubble{background:var(--dark);color:#fff;border-bottom-right-radius:5px;}
  .row.bot .bubble{background:#fff;color:var(--ink);border:1px solid var(--line);border-bottom-left-radius:5px;box-shadow:0 1px 3px rgba(30,40,80,.05);}
  .row.bot .bubble.err{background:#FFF6F6;border-color:#F3D3D6;color:#9B2C33;}
  /* Card */
  .card{max-width:88%;background:#fff;border:1px solid var(--line);border-radius:16px;border-bottom-left-radius:5px;overflow:hidden;box-shadow:0 2px 8px rgba(30,40,80,.07);}
  .card .chd{background:linear-gradient(135deg,var(--dark),var(--dark2));color:#fff;padding:12px 14px;}
  .card .chd .lbl{font-size:11px;font-weight:700;color:#C9D0E6;letter-spacing:.5px;}
  .card .chd .ttl{font-size:15.5px;font-weight:800;margin-top:3px;line-height:1.4;}
  .card .cbd{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
  .pill{align-self:flex-start;color:#fff;font-size:12.5px;font-weight:800;padding:5px 12px;border-radius:20px;}
  .kv{display:flex;gap:10px;font-size:14px;}
  .kv .k{color:var(--muted);flex:0 0 62px;}
  .kv .v{color:var(--ink);font-weight:700;flex:1;}
  .sec-t{font-size:11.5px;color:var(--muted);font-weight:800;letter-spacing:.4px;}
  .bul{display:flex;gap:7px;font-size:14px;line-height:1.5;}
  .bul .d{color:var(--red);flex:0 0 auto;font-weight:800;}
  .risk{background:#FBF0F1;border-radius:10px;padding:10px 12px;}
  .risk .rt{font-size:12px;font-weight:800;color:#B0242E;}
  .risk .rx{font-size:13.5px;color:#6B5257;margin-top:3px;line-height:1.5;}
  .foot{font-size:11px;color:var(--muted);text-align:center;padding:2px 6px 0;line-height:1.5;}
  .sep{height:1px;background:var(--line);margin:2px 0;}
  /* chips */
  #chips{padding:2px 12px 12px;display:flex;flex-wrap:wrap;gap:8px;}
  .chip{background:#fff;border:1px solid #D9DEEA;color:var(--dark);border-radius:20px;padding:9px 14px;font-size:13.5px;font-weight:600;}
  .chip:active{background:#EEF1F8;}
  .hint{padding:0 14px 6px;font-size:12px;color:var(--muted);}
  /* typing */
  .typing{display:inline-flex;gap:4px;align-items:center;padding:14px 16px;}
  .typing i{width:7px;height:7px;border-radius:50%;background:#B7BECE;animation:tp 1s infinite;}
  .typing i:nth-child(2){animation-delay:.15s;} .typing i:nth-child(3){animation-delay:.3s;}
  @keyframes tp{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-4px);}}
  /* Composer */
  .composer{background:#fff;border-top:1px solid var(--line);padding:8px 10px calc(env(safe-area-inset-bottom) + 8px);display:flex;align-items:flex-end;gap:8px;}
  .composer textarea{
    flex:1;resize:none;border:1px solid #D9DEEA;border-radius:22px;padding:10px 14px;font-size:15px;
    max-height:120px;line-height:1.4;font-family:inherit;outline:none;background:#F7F9FC;
  }
  .composer textarea:focus{border-color:var(--dark);background:#fff;}
  .btn{flex:0 0 auto;width:44px;height:44px;border:0;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;}
  .btn svg{width:22px;height:22px;fill:#fff;}
  .btn.mic{background:var(--dark);}
  .btn.mic.rec{background:var(--red);animation:pulse 1.1s infinite;}
  .btn.send{background:var(--red);}
  .btn:disabled{opacity:.4;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(200,16,46,.5);}70%{box-shadow:0 0 0 12px rgba(200,16,46,0);}100%{box-shadow:0 0 0 0 rgba(200,16,46,0);}}
  .recbar{display:none;align-items:center;gap:8px;font-size:13px;color:var(--red);font-weight:700;padding:0 6px;}
  .recbar.on{display:flex;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--red);animation:pulse 1.1s infinite;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 100 100" aria-hidden="true"><rect width="100" height="100" rx="20" fill="#1B2340"/><rect x="24" y="52" width="12" height="26" rx="2" fill="#C8102E"/><rect x="44" y="38" width="12" height="40" rx="2" fill="#C8102E"/><rect x="64" y="24" width="12" height="54" rx="2" fill="#C8102E"/></svg>
  </div>
  <div class="t">
    <h1>AI 投資助理</h1>
    <p id="sub">請直說 — 打字或按住說話都行</p>
  </div>
  <button class="newchat" id="newchat">＋ 新對話</button>
</header>

<div id="msgs"></div>

<div class="hint" id="voiceHint" style="display:none;">🎙️ 語音辨識未開通,可先用打字。</div>
<div id="chips"></div>

<div class="composer">
  <div class="recbar" id="recbar"><span class="dot"></span>錄音中… 再按一次結束</div>
  <textarea id="input" rows="1" placeholder="想問什麼?直接說…例如「現在適合布局哪個市場?」"></textarea>
  <button class="btn mic" id="mic" title="語音">
    <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M17 11a1 1 0 0 0-2 0 3 3 0 0 1-6 0 1 1 0 0 0-2 0 5 5 0 0 0 4 4.9V19H8a1 1 0 0 0 0 2h8a1 1 0 0 0 0-2h-3v-3.1A5 5 0 0 0 17 11z"/></svg>
  </button>
  <button class="btn send" id="send" title="送出">
    <svg viewBox="0 0 24 24"><path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/></svg>
  </button>
</div>

<script>
const LIFF_ID = "__LIFF_ID__";
const ORG = "__ORG_NAME__";
const STT_READY = (__STT_READY__);
let USER_ID = "web-" + Math.random().toString(36).slice(2,10);
let DISPLAY = "";

const msgs = document.getElementById('msgs');
const input = document.getElementById('input');
const chipsBox = document.getElementById('chips');
const EXAMPLES = [
  "現在適合布局哪個市場、哪個商品?",
  "這筆閒置資金該怎麼配置?",
  "台積電現在可以進場嗎?",
  "美股這波要不要減碼?",
  "大盤"
];

function el(tag, cls, txt){const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e;}
function scroll(){ requestAnimationFrame(()=>{ msgs.scrollTop = msgs.scrollHeight; }); }

function addUser(text){
  const row=el('div','row me'); const b=el('div','bubble',text); row.appendChild(b); msgs.appendChild(row); scroll(); return row;
}
function addBotText(text, err){
  const row=el('div','row bot'); const b=el('div','bubble'+(err?' err':''),text); row.appendChild(b); msgs.appendChild(row); scroll(); return row;
}
function addTyping(){
  const row=el('div','row bot'); const b=el('div','bubble'); const t=el('div','typing');
  t.appendChild(el('i')); t.appendChild(el('i')); t.appendChild(el('i')); b.appendChild(t); row.appendChild(b);
  msgs.appendChild(row); scroll(); return row;
}
function stanceColor(s){ if(!s)return 'var(--flat)'; if(s.includes('多'))return 'var(--bull)'; if(s.includes('空'))return 'var(--bear)'; return 'var(--flat)'; }

function addCard(card){
  if(!card){ addBotText("(沒有內容)"); return; }
  const t = card.type || 'simple';
  const row = el('div','row bot');
  if(t==='simple'){
    const b = el('div','bubble');
    const parts=[];
    if(card.title) parts.push(card.title);
    (card.points||[]).forEach(p=>parts.push("・"+p));
    if(card.risk) parts.push("⚠ "+card.risk);
    b.textContent = parts.join("\n") || "—";
    row.appendChild(b); msgs.appendChild(row); scroll(); return;
  }
  const card_ = el('div','card');
  const chd = el('div','chd');
  chd.appendChild(el('div','lbl', t==='recommendation' ? 'AI 投資建議' : '個股／主題分析'));
  chd.appendChild(el('div','ttl', card.title||'—'));
  card_.appendChild(chd);
  const cbd = el('div','cbd');
  if(card.stance){ const p=el('div','pill','傾向 '+card.stance); p.style.background=stanceColor(card.stance); cbd.appendChild(p); }
  const rows=[['市場',card.market],['商品',card.instrument],['這是什麼',card.instrument_desc],['方向',card.entry]].filter(r=>r[1]);
  if(rows.length){ const box=el('div'); box.style.display='flex'; box.style.flexDirection='column'; box.style.gap='7px';
    rows.forEach(r=>{ const kv=el('div','kv'); kv.appendChild(el('div','k',r[0])); kv.appendChild(el('div','v',r[1])); box.appendChild(kv); }); cbd.appendChild(box); }
  const pts=(card.points||[]).filter(Boolean);
  if(pts.length){ cbd.appendChild(el('div','sep')); cbd.appendChild(el('div','sec-t','為什麼'));
    pts.forEach(p=>{ const b=el('div','bul'); b.appendChild(el('div','d','・')); b.appendChild(el('div',null,p)); cbd.appendChild(b); }); }
  if(card.risk){ const r=el('div','risk'); r.appendChild(el('div','rt','⚠ 風險與觀察重點')); r.appendChild(el('div','rx',card.risk)); cbd.appendChild(r); }
  card_.appendChild(cbd);
  if(card.note){ card_.appendChild(el('div','foot',card.note)); }
  row.appendChild(card_); msgs.appendChild(row); scroll();
}

function renderChips(){
  chipsBox.innerHTML='';
  if(msgs.children.length>1) return; // 開始對話後就收起
  EXAMPLES.forEach(q=>{ const c=el('div','chip',q); c.onclick=()=>{ send(q); }; chipsBox.appendChild(c); });
}

async function send(text){
  text=(text||input.value||'').trim(); if(!text) return;
  input.value=''; autosize();
  addUser(text); chipsBox.innerHTML='';
  const typing=addTyping();
  try{
    const r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:USER_ID,message:text})});
    const j=await r.json(); typing.remove();
    if(j.ok){ addCard(j.card); } else { addBotText(errMsg(j.error), true); }
  }catch(e){ typing.remove(); addBotText("連線出了點狀況,請再試一次。", true); }
}

function errMsg(code){
  if(code==='AI_DISABLED') return "AI 尚未啟用,請稍後再試。";
  return "抱歉,剛剛連線市場資料時出了點狀況,請再問一次。";
}

/* ---- 語音 ---- */
let mediaRecorder=null, chunks=[], recording=false;
const micBtn=document.getElementById('mic');
const recbar=document.getElementById('recbar');
function setRecUI(on){ micBtn.classList.toggle('rec',on); recbar.classList.toggle('on',on); }

async function toggleRec(){
  if(!STT_READY){ addBotText("語音辨識尚未開通(需設定金鑰),您可以先用打字。"); return; }
  if(recording){ try{ mediaRecorder.stop(); }catch(e){} return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
               : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '');
    mediaRecorder = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream);
    chunks=[];
    mediaRecorder.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop()); recording=false; setRecUI(false);
      const type = mediaRecorder.mimeType || 'audio/webm';
      const blob=new Blob(chunks,{type});
      await sendAudio(blob, type);
    };
    mediaRecorder.start(); recording=true; setRecUI(true);
  }catch(e){ addBotText("拿不到麥克風權限,請允許後再試,或改用打字。", true); }
}

async function sendAudio(blob, type){
  const ext = type.includes('mp4')?'mp4':(type.includes('ogg')?'ogg':'webm');
  const holder=addUser("🎙️ 辨識中…");
  const typing=addTyping();
  try{
    const fd=new FormData();
    fd.append('audio', blob, 'voice.'+ext);
    fd.append('userId', USER_ID);
    const r=await fetch('/api/ask_audio',{method:'POST',body:fd});
    const j=await r.json(); typing.remove();
    if(j.ok){ holder.querySelector('.bubble').textContent = "🎙️ " + (j.transcript||''); addCard(j.card); }
    else if(j.error==='NO_STT'){ holder.querySelector('.bubble').textContent="🎙️ 語音"; addBotText("語音辨識尚未開通,請改用打字。", true); }
    else { holder.querySelector('.bubble').textContent = j.transcript ? ("🎙️ "+j.transcript) : "🎙️ 語音"; addBotText(errMsg(j.error), true); }
  }catch(e){ typing.remove(); holder.querySelector('.bubble').textContent="🎙️ 語音"; addBotText("語音上傳失敗,請再試一次或改用打字。", true); }
}

/* ---- 新對話(清記憶)---- */
async function newChat(){
  try{ await fetch('/api/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:USER_ID})}); }catch(e){}
  msgs.innerHTML=''; greet(); renderChips();
}

function greet(){
  const hi = DISPLAY ? (DISPLAY+" 您好,") : "您好,";
  addBotText(hi + "我是 "+ORG+" 的 AI 投資助理。直接用口語問我市場、個股、資產配置或公司資金安排都行 — 打字或按右下角麥克風說話都可以,我會記得我們聊過什麼。");
}

/* ---- UI 綁定 ---- */
function autosize(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,120)+'px'; }
input.addEventListener('input',autosize);
input.addEventListener('keydown',e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
document.getElementById('send').onclick=()=>send();
micBtn.onclick=toggleRec;
document.getElementById('newchat').onclick=newChat;
if(!STT_READY){ document.getElementById('voiceHint').style.display='block'; }

/* ---- 啟動 ---- */
async function boot(){
  if(LIFF_ID){
    try{
      await liff.init({liffId:LIFF_ID});
      if(!liff.isInClient() && !liff.isLoggedIn()){ liff.login(); return; }
      const p=await liff.getProfile(); USER_ID=p.userId; DISPLAY=p.displayName||"";
    }catch(e){ console.warn('LIFF init failed, fallback anon:', e); }
  }
  greet(); renderChips();
}
boot();
</script>
</body>
</html>
